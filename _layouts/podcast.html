---
layout: default
---

<!-- <small>{{ page.date | date: "%-d %B %Y" }}</small> -->
<h2>
    {{ page.title }}
    <br />
    <small>{{ page.subtitle }}</small>
</h2>

{% if page.photo-url %}
<section class="photo-section">
    <img src="{{ page.photo-url | relative_url }}" alt="{{ page.title }}" class="episode-photo" />
    {% if page.photo-caption %}
    <p class="photo-caption">{{ page.photo-caption }}</p>
    {% endif %}
</section>
{% endif %}

<section>
    <audio class="podcast" preload="auto" controls>
      <source src="{{ page.mp3-url | replace: '?', '%3F' | replace: ' ', '%20' | prepend: site.baseurl | prepend: site.url }}" type="audio/mpeg" />
    </audio>
</section>

<!-- <h3>Notes</h3> -->
{{content}}

{% if page.keywords %}
  <small>tags: <em>{{ page.keywords | join: "</em>, <em>" }}</em></small>
{% endif %}
